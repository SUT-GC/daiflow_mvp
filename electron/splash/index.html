<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f1117;
      color: #e0e0e0;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #7c5cfc;
    }
    /* 主进度条 */
    .main-progress {
      width: 280px;
      margin: 24px 0 16px;
    }
    .progress-bar-container {
      height: 4px;
      background: rgba(124, 92, 252, 0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c5cfc 0%, #9d7eff 100%);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    /* 子进度条 (pip/alembic) */
    .sub-progress {
      width: 280px;
      margin: 12px 0;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(124, 92, 252, 0.15);
      display: none; /* 默认隐藏 */
    }
    .sub-progress-bar-container {
      height: 3px;
      background: rgba(124, 92, 252, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .sub-progress-bar {
      height: 100%;
      background: #7c5cfc;
      width: 0%;
      transition: width 0.2s ease;
    }
    .sub-progress-label {
      font-size: 11px;
      color: #888;
      font-family: 'Courier New', monospace;
    }
    /* 当前阶段显示 */
    .stage-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 92, 252, 0.2);
      border-top-color: #7c5cfc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 14px;
      color: #888;
      text-align: center;
      padding: 0 20px;
    }
    /* 日志查看器 */
    .log-viewer-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      -webkit-app-region: no-drag;
    }
    .toggle-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(124, 92, 252, 0.2);
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .toggle-btn:hover {
      background: rgba(124, 92, 252, 0.1);
      border-color: rgba(124, 92, 252, 0.4);
      color: #ccc;
    }
    .toggle-btn .icon {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }
    .toggle-btn.expanded .icon {
      transform: rotate(180deg);
    }
    .log-viewer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: rgba(15, 17, 23, 0.98);
      border-top: 1px solid rgba(124, 92, 252, 0.2);
      -webkit-app-region: no-drag;
      overflow: hidden;
      display: none;
    }
    .log-content {
      height: 100%;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #bbb;
    }
    .log-entry {
      margin: 2px 0;
      word-break: break-all;
    }
    .log-entry.error { color: #ff6b6b; }
    .log-entry.warning { color: #ffa500; }
    .log-entry.success { color: #51cf66; }
  </style>
</head>
<body>
  <div class="logo">DaiFlow</div>

  <!-- 主进度条 -->
  <div class="main-progress">
    <div class="progress-bar-container">
      <div class="progress-bar" id="mainProgressBar"></div>
    </div>
    <div class="progress-text" id="progressText">0/6 步骤完成</div>
  </div>

  <!-- 当前阶段显示 -->
  <div class="stage-container">
    <div class="spinner"></div>
    <div id="status" class="status-text">正在初始化...</div>
  </div>

  <!-- 子进度 (pip/alembic) -->
  <div class="sub-progress" id="subProgress">
    <div class="sub-progress-bar-container">
      <div class="sub-progress-bar" id="subProgressBar"></div>
    </div>
    <div class="sub-progress-label" id="subProgressLabel"></div>
  </div>

  <!-- 日志查看器（可折叠） -->
  <div class="log-viewer-toggle">
    <button id="toggleLogs" class="toggle-btn">
      <span class="icon">▼</span> 查看详细日志
    </button>
  </div>

  <div class="log-viewer" id="logViewer">
    <div class="log-content" id="logContent"></div>
  </div>

  <script>
    // 状态管理
    const state = {
      totalStages: 6,
      completedStages: 0,
      logs: [],
      isLogsExpanded: false
    };

    // DOM 元素
    const elements = {
      mainProgressBar: document.getElementById('mainProgressBar'),
      progressText: document.getElementById('progressText'),
      status: document.getElementById('status'),
      subProgress: document.getElementById('subProgress'),
      subProgressBar: document.getElementById('subProgressBar'),
      subProgressLabel: document.getElementById('subProgressLabel'),
      toggleLogsBtn: document.getElementById('toggleLogs'),
      logViewer: document.getElementById('logViewer'),
      logContent: document.getElementById('logContent')
    };

    // 更新主进度
    function updateMainProgress(completed) {
      state.completedStages = completed;
      const percentage = (completed / state.totalStages) * 100;
      elements.mainProgressBar.style.width = `${percentage}%`;
      elements.progressText.textContent = `${completed}/${state.totalStages} 步骤完成`;
    }

    // 更新子进度
    function updateSubProgress(data) {
      if (!data || !data.progress) {
        elements.subProgress.style.display = 'none';
        return;
      }

      elements.subProgress.style.display = 'block';
      const { current, total, label } = data.progress;
      const percentage = Math.min((current / total) * 100, 100);
      elements.subProgressBar.style.width = `${percentage}%`;
      elements.subProgressLabel.textContent = `${current}/${total} - ${label}`;
    }

    // 添加日志
    function addLog(message, type = 'info') {
      state.logs.push({ message, type, timestamp: Date.now() });

      // 限制日志缓冲区大小（防止内存泄漏）
      if (state.logs.length > 1000) {
        state.logs.shift();
      }

      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      elements.logContent.appendChild(entry);

      // 自动滚动到底部
      elements.logContent.scrollTop = elements.logContent.scrollHeight;
    }

    // 日志切换
    elements.toggleLogsBtn.addEventListener('click', () => {
      state.isLogsExpanded = !state.isLogsExpanded;
      elements.logViewer.style.display = state.isLogsExpanded ? 'block' : 'none';
      elements.toggleLogsBtn.classList.toggle('expanded', state.isLogsExpanded);
      elements.toggleLogsBtn.innerHTML = state.isLogsExpanded
        ? '<span class="icon">▲</span> 隐藏日志'
        : '<span class="icon">▼</span> 查看详细日志';
    });

    // 监听主进程消息
    window.electronAPI.onStatus((data) => {
      // 兼容旧字符串格式
      if (typeof data === 'string') {
        elements.status.textContent = data;
        addLog(data);
        return;
      }

      // 新对象格式
      const { type, message, detail } = data;

      switch (type) {
        case 'status':
          if (message) {
            elements.status.textContent = message;
            addLog(message);
          }
          break;

        case 'progress':
          if (message) {
            elements.status.textContent = message;
          }
          updateSubProgress(data);
          if (detail) addLog(detail);
          break;

        case 'log':
          if (detail) addLog(detail);
          break;

        case 'error':
          if (message) addLog(message, 'error');
          break;

        case 'stage-complete':
          updateMainProgress(state.completedStages + 1);
          updateSubProgress(null); // 隐藏子进度
          break;
      }
    });
  </script>
</body>
</html>
